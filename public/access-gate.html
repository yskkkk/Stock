<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e13" />
    <title>접근 확인 · 종목 대시보드</title>
    <style>
      :root {
        --bg: #0a0e13;
        --card: #161d27;
        --border: rgba(148, 163, 184, 0.14);
        --text: #eef2f7;
        --dim: #9aa8bc;
        --muted: #6d7d92;
        --accent: #5eead4;
        --accent-dim: rgba(94, 234, 212, 0.12);
        --down: #f87171;
      }
      * {
        box-sizing: border-box;
      }
      html {
        margin: 0;
        min-height: 100%;
      }
      body {
        min-height: 100dvh;
        height: auto;
        margin: 0;
        font-family: "DM Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-text-size-adjust: 100%;
        padding: max(1.25rem, env(safe-area-inset-top, 0px))
          max(1rem, env(safe-area-inset-right, 0px))
          max(1.25rem, env(safe-area-inset-bottom, 0px))
          max(1rem, env(safe-area-inset-left, 0px));
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body.gate-admin-layout {
        align-items: flex-start;
        justify-content: flex-start;
      }
      body.gate-admin-layout #main.card {
        max-width: min(1180px, 100%);
      }
      body.gate-admin-layout #main > .product,
      body.gate-admin-layout #main > h1,
      body.gate-admin-layout #main > #feedback,
      body.gate-admin-layout #requestBlock,
      body.gate-admin-layout #pendingBlock {
        display: none !important;
      }
      body.gate-admin-layout #adminPanel.admin {
        margin-top: 0;
        padding-top: 0;
        border-top: none;
      }
      .card {
        width: 100%;
        max-width: 440px;
        padding: 1.25rem 1.35rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      }
      .product {
        margin: 0 0 0.35rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        line-height: 1.35;
      }
      p {
        margin: 0 0 0.65rem;
        font-size: 0.85rem;
        line-height: 1.55;
        color: var(--dim);
      }
      .feedback {
        color: var(--accent);
        font-size: 0.85rem;
      }
      .err {
        color: var(--down);
      }
      label.adm-memo-apr span,
      label.adm-memo-allow span {
        display: block;
        font-size: 0.76rem;
        color: var(--muted);
        margin-bottom: 0.3rem;
      }
      label.adm-memo-apr input,
      label.adm-memo-allow input {
        width: 100%;
        margin-bottom: 0.45rem;
        padding: 0.45rem 0.55rem;
        font-family: inherit;
        font-size: 0.85rem;
        color: var(--text);
        background: #121820;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      #requestBlock label > span,
      #adminPwdGate label > span {
        display: block;
        font-size: 0.78rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      textarea {
        width: 100%;
        min-height: 4rem;
        margin-bottom: 0.85rem;
        padding: 0.55rem 0.65rem;
        font-family: inherit;
        font-size: 16px;
        color: var(--text);
        background: #121820;
        border: 1px solid var(--border);
        border-radius: 6px;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      input.mac-inp {
        width: 100%;
        margin-bottom: 0.35rem;
        padding: 0.5rem 0.6rem;
        font-family: ui-monospace, monospace;
        font-size: 15px;
        color: var(--text);
        background: #121820;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      input.mac-inp:focus {
        outline: none;
        border-color: var(--accent);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.25rem;
      }
      button {
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .btn-primary {
        color: #0a0e13;
        background: var(--accent);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-secondary {
        color: var(--text);
        background: #121820;
        border-color: var(--border);
      }
      .btn-ghost {
        color: var(--dim);
        background: transparent;
        border-color: var(--border);
      }
      .admin {
        margin-top: 1rem;
        padding-top: 0.85rem;
        border-top: 1px solid var(--border);
      }
      .admin h2 {
        margin: 0 0 0.4rem;
        font-size: 0.95rem;
      }
      .admin-intro-wrap {
        margin: 0 0 0.55rem;
      }
      .admin-intro-wrap summary {
        cursor: pointer;
        font-size: 0.76rem;
        color: var(--muted);
        user-select: none;
      }
      .admin-intro-wrap .admin-intro-body {
        margin-top: 0.35rem;
        font-size: 0.74rem;
        line-height: 1.45;
        color: var(--muted);
        padding: 0.4rem 0.5rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: rgba(148, 163, 184, 0.06);
      }
      #adminContent {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .admin-toolbar-sticky {
        position: sticky;
        top: max(0px, env(safe-area-inset-top, 0px));
        z-index: 5;
        margin: 0 0 0.15rem;
        padding: 0.35rem 0 0.5rem;
        background: var(--card);
        border-bottom: 1px solid var(--border);
      }
      .admin-list-section {
        margin-top: 0;
      }
      .admin-list-section--pending {
        order: -2;
        padding: 0.5rem 0.55rem;
        border: 1px solid rgba(94, 234, 212, 0.45);
        border-radius: 8px;
        background: var(--accent-dim);
      }
      .admin-list-section--pending h3 {
        color: var(--accent);
      }
      .admin-list-section--allowed {
        order: 1;
      }
      .admin-intro-wrap {
        order: 2;
      }
      .admin-list-section h3 {
        margin: 0 0 0.35rem;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--dim);
      }
      #admPending {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 0.45rem;
        align-items: start;
      }
      #admAllowed {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.45rem;
        align-items: start;
      }
      .admin input[type="password"] {
        width: 100%;
        padding: 0.45rem 0.55rem;
        margin-bottom: 0.5rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        color: var(--text);
        background: #121820;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      .admin .item {
        font-size: 0.76rem;
        padding: 0.4rem 0.5rem;
        margin: 0;
        background: #121820;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--dim);
        line-height: 1.4;
      }
      .admin .item code {
        color: var(--text);
        font-size: 0.78rem;
      }
      .admin .item .item-head {
        margin-bottom: 0.2rem;
        word-break: break-all;
      }
      .admin .item .sub {
        font-size: 0.68rem;
        margin: 0.15rem 0 0;
        word-break: break-word;
      }
      .admin .item label.adm-memo-allow,
      .admin .item label.adm-memo-apr {
        margin-top: 0.25rem;
      }
      .admin .item label.adm-memo-allow span,
      .admin .item label.adm-memo-apr span {
        margin-bottom: 0.15rem;
        font-size: 0.68rem;
      }
      .admin .item label.adm-memo-allow input,
      .admin .item label.adm-memo-apr input {
        margin-bottom: 0;
        padding: 0.32rem 0.4rem;
        font-size: 0.78rem;
      }
      .admin .item .row {
        margin-top: 0.3rem;
        gap: 0.35rem;
      }
      .admin .item .row button {
        flex: 1 1 0;
        min-width: 0;
        padding: 0.38rem 0.5rem;
        font-size: 0.74rem;
      }
      .hidden {
        display: none !important;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 0.75rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #loading {
        text-align: center;
      }
      #main.hidden + #loading {
        display: block;
      }
      #loading:not(.show) {
        display: none;
      }
      #loading.show {
        display: block;
      }

      #admPending > .item:only-child,
      #admAllowed > .item:only-child {
        grid-column: 1 / -1;
      }

      @media (max-width: 520px) {
        body {
          align-items: flex-start;
          padding-top: max(0.85rem, env(safe-area-inset-top, 0px))
            max(0.85rem, env(safe-area-inset-right, 0px))
            max(1rem, env(safe-area-inset-bottom, 0px))
            max(0.85rem, env(safe-area-inset-left, 0px));
          overflow-x: clip;
          -webkit-overflow-scrolling: touch;
        }

        #main.card {
          max-width: none;
          width: min(440px, 100%);
          margin-inline: auto;
        }

        body.gate-admin-layout #main.card {
          max-width: none;
          width: 100%;
        }

        #admPending,
        #admAllowed {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 1.05rem 1rem;
        }

        h1 {
          font-size: 1.08rem;
        }

        .row button {
          flex: 1 1 auto;
          min-height: 44px;
          min-width: min(140px, 100%);
          justify-content: center;
          display: inline-flex;
          align-items: center;
        }

        .admin .item {
          word-break: break-word;
        }
      }

      @media (max-height: 520px) and (max-width: 900px) {
        body {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading" class="show">
      <div class="spinner" aria-hidden="true"></div>
      <p style="text-align: center; color: var(--dim)">접근 권한을 확인하는 중…</p>
    </div>
    <p
      id="fetchErr"
      class="err hidden"
      style="max-width: 440px; margin: 0 auto 1rem; text-align: center"
    ></p>
    <div id="main" class="card hidden">
      <p class="product">종목 대시보드</p>
      <h1 id="accessGateSecretTap">접근 제한</h1>
      <p id="feedback" class="feedback hidden"></p>

      <div id="requestBlock">
        <label>
          <span>Wi-Fi MAC 주소 (선택)</span>
          <input
            type="text"
            id="clientMac"
            class="mac-inp"
            maxlength="32"
            placeholder="예: AA:BB:CC:DD:EE:FF"
            spellcheck="false"
            autocomplete="off"
          />
        </label>
        <p
          class="mac-hint"
          style="
            font-size: 0.72rem;
            color: var(--muted);
            margin: 0 0 0.75rem;
            line-height: 1.45;
          "
        >
          휴대폰 Wi-Fi 설정 등에서 확인합니다. 저장하면 IP가 바뀌어도 같은 단말로 인식합니다(브라우저는 MAC을
          자동으로 읽지 못합니다).
        </p>
        <label>
          <span>메모 (선택)</span>
          <textarea
            id="msg"
            maxlength="500"
            placeholder="신청 사유, 연락처 등"
          ></textarea>
        </label>
        <div class="row">
          <button type="button" class="btn-primary" id="btnReq">접속 신청</button>
        </div>
      </div>

      <div id="pendingBlock" class="hidden">
        <div class="row">
          <button type="button" class="btn-secondary" id="btnAdmin2">접근 관리</button>
        </div>
      </div>

      <div id="adminPanel" class="admin hidden">
        <h2>IP·MAC 접근 관리</h2>
        <div id="adminPwdGate">
          <label>
            <span>관리자 비밀번호</span>
            <input type="password" id="admPwd" autocomplete="current-password" placeholder="비밀번호" />
          </label>
          <div class="row" style="margin-top: 0.5rem">
            <button type="button" class="btn-primary" id="btnAdminUnlock">확인</button>
          </div>
          <p id="admPwdErr" class="err hidden"></p>
        </div>
        <div id="adminContent" class="hidden">
          <div class="admin-toolbar-sticky">
            <div class="row">
              <button type="button" class="btn-secondary" id="btnAdminLock">관리 종료</button>
              <button type="button" class="btn-ghost" id="btnAdmClose">닫기</button>
            </div>
            <p id="admErr" class="err hidden"></p>
          </div>
          <section class="admin-list-section admin-list-section--pending">
            <h3 id="admPendingTitle">대기 중 — 승인·거절</h3>
            <div id="admPending"></div>
          </section>
          <section class="admin-list-section admin-list-section--allowed">
            <h3>허용 목록</h3>
            <div id="admAllowed"></div>
          </section>
          <details class="admin-intro-wrap">
            <summary>접근 관리 안내</summary>
            <p class="admin-intro-body">
              허용 <strong>IP</strong> 또는 <strong>MAC</strong>이 맞으면 이용 가능합니다.
              <strong>대기</strong>·<strong>승인</strong>·<strong>거절</strong>·<strong>허가 취소</strong>는 각 버튼대로 동작합니다.
            </p>
          </details>
        </div>
      </div>
    </div>

    <script type="module">
      const TOKEN_KEY = "stock_access_admin_token";
      const MAC_KEY = "stock_access_client_mac";

      const $ = (id) => document.getElementById(id);

      function setGateAdminLayout(on) {
        document.body.classList.toggle("gate-admin-layout", Boolean(on));
      }

      function scrollAdminToPending() {
        window.scrollTo({ top: 0, left: 0, behavior: "auto" });
        requestAnimationFrame(() => {
          const target =
            $("admPending")?.querySelector(".item") || $("admPendingTitle");
          target?.scrollIntoView({ block: "start", behavior: "smooth" });
        });
      }

      function fmtGateTime(iso) {
        const s = String(iso ?? "").trim();
        if (!s) return "";
        const d = new Date(s);
        if (!Number.isFinite(d.getTime())) return s;
        return d.toLocaleString("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
      }

      function normalizeMac(v) {
        const s = String(v ?? "")
          .trim()
          .toLowerCase()
          .replace(/[^0-9a-f]/g, "");
        if (s.length !== 12 || !/^[0-9a-f]{12}$/.test(s)) return "";
        const p = s
          .toUpperCase()
          .match(/.{2}/g);
        return p ? p.join(":") : "";
      }

      function storedMac() {
        try {
          return normalizeMac(localStorage.getItem(MAC_KEY));
        } catch (_) {
          return "";
        }
      }

      function syncMacCookie(mac) {
        try {
          if (mac) {
            document.cookie =
              MAC_KEY +
              "=" +
              encodeURIComponent(mac) +
              "; Path=/; Max-Age=31536000; SameSite=Lax";
          } else {
            document.cookie = MAC_KEY + "=; Path=/; Max-Age=0";
          }
        } catch (_) {}
      }

      function persistMacField() {
        const el = $("clientMac");
        if (!(el instanceof HTMLInputElement)) return;
        const m = normalizeMac(el.value);
        if (!m) {
          try {
            localStorage.removeItem(MAC_KEY);
          } catch (_) {}
          syncMacCookie("");
          return;
        }
        try {
          localStorage.setItem(MAC_KEY, m);
        } catch (_) {}
        el.value = m;
        syncMacCookie(m);
      }

      function resolvedClientMac() {
        const el = $("clientMac");
        if (el instanceof HTMLInputElement) {
          const t = normalizeMac(el.value);
          if (t) return t;
        }
        return storedMac();
      }

      function withClientMac(h) {
        const out = { ...(h || {}) };
        const m = resolvedClientMac();
        if (m && !out["X-Access-Client-Mac"] && !out["x-access-client-mac"]) {
          out["X-Access-Client-Mac"] = m;
        }
        return out;
      }

      (function initMacFromStorage() {
        const el = $("clientMac");
        if (!(el instanceof HTMLInputElement)) return;
        const sm = storedMac();
        if (sm) el.value = sm;
        syncMacCookie(sm);
      })();

      $("clientMac")?.addEventListener("blur", () => persistMacField());
      const loading = $("loading");
      const main = $("main");
      const requestBlock = $("requestBlock");
      const pendingBlock = $("pendingBlock");

      async function parseJson(res) {
        const t = await res.text();
        try {
          return t ? JSON.parse(t) : {};
        } catch {
          return {};
        }
      }

      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: {
            Accept: "application/json",
            ...withClientMac(opts.headers || {}),
          },
          cache: "no-store",
        });
        const data = await parseJson(res);
        if (!res.ok) {
          const err = new Error(data.error || data.message || "요청 실패");
          err.status = res.status;
          throw err;
        }
        return data;
      }

      function token() {
        try {
          const s = (sessionStorage.getItem(TOKEN_KEY) || "").trim();
          if (s) return s;
          const l = (localStorage.getItem(TOKEN_KEY) || "").trim();
          if (l) {
            try {
              sessionStorage.setItem(TOKEN_KEY, l);
              localStorage.removeItem(TOKEN_KEY);
            } catch (_) {}
            return l;
          }
        } catch (_) {}
        return "";
      }

      function setToken(t) {
        try {
          localStorage.removeItem(TOKEN_KEY);
          sessionStorage.setItem(TOKEN_KEY, t);
        } catch (_) {}
      }

      function collectDeviceInfo() {
        const nav = navigator;
        const scr = window.screen;
        const dm = nav.deviceMemory;
        const rm = resolvedClientMac();
        return {
          userAgent: nav.userAgent,
          platform: nav.platform,
          language: nav.language,
          languages: Array.isArray(nav.languages)
            ? nav.languages.slice(0, 24).join(", ")
            : nav.language,
          screen: scr ? `${scr.width}x${scr.height}` : "",
          viewport: `${window.innerWidth}x${window.innerHeight}`,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
          hardwareConcurrency:
            typeof nav.hardwareConcurrency === "number" ? nav.hardwareConcurrency : null,
          deviceMemory: typeof dm === "number" ? dm : null,
          maxTouchPoints:
            typeof nav.maxTouchPoints === "number" ? nav.maxTouchPoints : null,
          cookieEnabled: nav.cookieEnabled,
          ...(rm ? { clientMac: rm } : {}),
        };
      }

      let pollId = null;
      let adminPollId = null;
      let lastStatusAdminIp = false;
      let adminFocusPending = false;

      function stopPoll() {
        if (pollId) clearInterval(pollId);
        pollId = null;
      }

      function stopAdminPoll() {
        if (adminPollId) clearInterval(adminPollId);
        adminPollId = null;
      }

      function startAdminPoll() {
        if (adminPollId != null) return;
        if ($("adminContent").classList.contains("hidden")) return;
        adminPollId = setInterval(() => void loadAdmin(), 2500);
      }

      function startPoll() {
        stopPoll();
        pollId = setInterval(() => void refresh(), 2000);
      }

      async function refresh() {
        $("fetchErr").classList.add("hidden");
        let s;
        try {
          s = await api("/api/access/status");
        } catch (e) {
          loading.classList.remove("show");
          $("fetchErr").textContent =
            "서버에 연결할 수 없습니다. npm run dev 가 실행 중인지 확인한 뒤 새로고침하세요.";
          $("fetchErr").classList.remove("hidden");
          return;
        }

        lastStatusAdminIp = Boolean(s.adminIpConsole);

        if (!s.enabled || s.state === "allowed") {
          stopPoll();
          stopAdminPoll();
          window.location.replace("/");
          return;
        }

        loading.classList.remove("show");
        main.classList.remove("hidden");

        const st = s.state;
        if (st === "pending") {
          requestBlock.classList.add("hidden");
          pendingBlock.classList.remove("hidden");
          startPoll();
        } else {
          stopPoll();
          pendingBlock.classList.add("hidden");
          requestBlock.classList.remove("hidden");
        }
      }

      $("btnReq").addEventListener("click", async () => {
        const btn = $("btnReq");
        $("feedback").classList.add("hidden");
        btn.disabled = true;
        persistMacField();
        try {
          await api("/api/access/request", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: $("msg").value.trim(),
              deviceInfo: collectDeviceInfo(),
            }),
          });
          await refresh();
        } catch (e) {
          $("feedback").textContent = e.message || "요청 실패";
          $("feedback").classList.remove("hidden");
        } finally {
          btn.disabled = false;
        }
      });

      function openAdmin() {
        stopAdminPoll();
        adminFocusPending = true;
        setGateAdminLayout(true);
        $("adminPanel").classList.remove("hidden");
        const savedPwd = token().trim();
        if (lastStatusAdminIp) {
          $("adminPwdGate").classList.add("hidden");
          $("adminContent").classList.remove("hidden");
          $("admPwd").value = "";
          $("admPwdErr").classList.add("hidden");
          $("admPwdErr").textContent = "";
          $("admErr").classList.add("hidden");
          void loadAdmin();
        } else if (savedPwd) {
          $("adminPwdGate").classList.add("hidden");
          $("adminContent").classList.remove("hidden");
          $("admPwdErr").classList.add("hidden");
          $("admPwdErr").textContent = "";
          $("admErr").classList.add("hidden");
          void loadAdmin();
        } else {
          $("adminPwdGate").classList.remove("hidden");
          $("adminContent").classList.add("hidden");
          $("admPwd").value = "";
          $("admPwdErr").classList.add("hidden");
          $("admPwdErr").textContent = "";
          $("admErr").classList.add("hidden");
          window.setTimeout(() => $("admPwd")?.focus(), 0);
        }
      }

      $("btnAdmin2").addEventListener("click", () => openAdmin());

      /** 앱의 MacroEventsBar와 동일: 제목 연속 탭으로만 관리 패널 */
      const SECRET_ADMIN_TAPS = 10;
      const SECRET_ADMIN_GAP_MS = 2800;
      const secretGateTap = { count: 0, at: 0 };
      $("accessGateSecretTap")?.addEventListener("click", () => {
        const nowMs = Date.now();
        if (nowMs - secretGateTap.at > SECRET_ADMIN_GAP_MS) secretGateTap.count = 0;
        secretGateTap.at = nowMs;
        secretGateTap.count += 1;
        if (secretGateTap.count < SECRET_ADMIN_TAPS) return;
        secretGateTap.count = 0;
        openAdmin();
      });

      $("btnAdmClose").addEventListener("click", () => {
        stopAdminPoll();
        setGateAdminLayout(false);
        $("adminPanel").classList.add("hidden");
      });

      async function tryAdminUnlock() {
        const el = $("admPwd");
        const pwd = el.value.trim();
        $("admPwdErr").classList.add("hidden");
        if (!pwd) {
          $("admPwdErr").classList.add("hidden");
          $("admPwdErr").textContent = "";
          el.focus();
          return;
        }
        el.disabled = true;
        $("btnAdminUnlock").disabled = true;
        try {
          const res = await fetch("/api/access/admin/requests", {
            headers: withClientMac({
              Authorization: "Bearer " + pwd,
            }),
            cache: "no-store",
          });
          const data = await parseJson(res);
          if (!res.ok) throw new Error(data.error || data.message || "실패");
          setToken(pwd);
          $("adminPwdGate").classList.add("hidden");
          $("adminContent").classList.remove("hidden");
          await loadAdmin();
        } catch (e) {
          $("admPwdErr").textContent = "비밀번호가 올바르지 않습니다.";
          $("admPwdErr").classList.remove("hidden");
          el.value = "";
          el.focus();
        } finally {
          el.disabled = false;
          $("btnAdminUnlock").disabled = false;
        }
      }

      $("btnAdminUnlock").addEventListener("click", () => void tryAdminUnlock());

      $("admPwd").addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          void tryAdminUnlock();
        }
      });

      $("btnAdminLock").addEventListener("click", () => {
        stopAdminPoll();
        try {
          sessionStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(TOKEN_KEY);
        } catch (_) {}
        if (lastStatusAdminIp) {
          setGateAdminLayout(false);
          $("adminPanel").classList.add("hidden");
          $("adminContent").classList.add("hidden");
          $("adminPwdGate").classList.add("hidden");
          return;
        }
        $("adminPwdGate").classList.remove("hidden");
        $("adminContent").classList.add("hidden");
        $("admPwd").value = "";
      });

      function clearBox(el) {
        while (el.firstChild) el.removeChild(el.firstChild);
      }

      function captureAprMemosFromDom() {
        const out = {};
        for (const el of document.querySelectorAll('[id^="adm-apr-memo-"]')) {
          if (!(el instanceof HTMLInputElement)) continue;
          const id = el.id.replace("adm-apr-memo-", "");
          if (id) out[id] = String(el.value || "");
        }
        return out;
      }

      function captureAllowedMemosFromDom() {
        const out = {};
        for (const inp of document.querySelectorAll(".adm-allowed-memo-inp")) {
          if (!(inp instanceof HTMLInputElement)) continue;
          const item = inp.closest(".item");
          const code = item?.querySelector("code");
          const ip = code?.textContent?.trim();
          if (ip) out[ip] = String(inp.value || "");
        }
        return out;
      }

      async function loadAdmin() {
        $("admErr").classList.add("hidden");
        const pend = $("admPending");
        const allow = $("admAllowed");
        const t = token().trim();
        if (!t && !lastStatusAdminIp) {
          $("admErr").textContent = "먼저 비밀번호로 확인하세요.";
          $("admErr").classList.remove("hidden");
          return;
        }
        try {
          const headers = withClientMac({});
          if (t) headers.Authorization = "Bearer " + t;
          const res = await fetch("/api/access/admin/requests", {
            headers,
            cache: "no-store",
          });
          const data = await parseJson(res);
          if (!res.ok) throw new Error(data.error || data.message || "실패");
          const prevAprMemos = captureAprMemosFromDom();
          const prevAllowedMemos = captureAllowedMemosFromDom();
          clearBox(pend);
          clearBox(allow);
          const list = data.pending || [];
          const pendingTitle = $("admPendingTitle");
          if (pendingTitle) {
            pendingTitle.textContent =
              list.length > 0
                ? `대기 중 ${list.length}건 — 승인·거절`
                : "대기 중 — 승인·거절";
          }
          if (list.length === 0) {
            const p = document.createElement("p");
            p.className = "item";
            p.textContent = "(대기 없음)";
            pend.appendChild(p);
          } else {
            for (const x of list) {
              const div = document.createElement("div");
              div.className = "item";
              const head = document.createElement("div");
              head.className = "item-head";
              const code = document.createElement("code");
              code.textContent = x.ip || "";
              head.appendChild(code);
              head.appendChild(
                document.createTextNode(" · " + fmtGateTime(x.requestedAt)),
              );
              div.appendChild(head);
              const xmac = x.clientMac || (x.deviceInfo && x.deviceInfo.clientMac);
              if (xmac) {
                const mc = document.createElement("div");
                mc.className = "sub";
                mc.textContent = "MAC: " + xmac;
                div.appendChild(mc);
              }
              if (x.message) {
                const sub = document.createElement("div");
                sub.className = "sub";
                sub.textContent = "신청: " + x.message;
                div.appendChild(sub);
              }
              const uaShort = String(x.userAgent || "").trim();
              if (uaShort || (x.deviceInfo && typeof x.deviceInfo === "object")) {
                const det = document.createElement("details");
                det.className = "sub";
                const sum = document.createElement("summary");
                sum.textContent = "단말 정보";
                det.appendChild(sum);
                if (uaShort) {
                  const uaEl = document.createElement("div");
                  uaEl.className = "sub";
                  uaEl.textContent = "UA: " + uaShort;
                  det.appendChild(uaEl);
                }
                if (x.deviceInfo && typeof x.deviceInfo === "object") {
                  const d = x.deviceInfo;
                  const lines = [];
                  if (d.platform) lines.push("platform: " + d.platform);
                  if (d.screen) lines.push("screen: " + d.screen);
                  if (d.viewport) lines.push("viewport: " + d.viewport);
                  if (d.timezone) lines.push("timezone: " + d.timezone);
                  if (d.language) lines.push("language: " + d.language);
                  if (d.clientMac) lines.push("clientMac: " + d.clientMac);
                  if (lines.length) {
                    const pre = document.createElement("pre");
                    pre.style.whiteSpace = "pre-wrap";
                    pre.style.wordBreak = "break-word";
                    pre.style.fontSize = "0.65rem";
                    pre.style.margin = "0.2rem 0 0";
                    pre.textContent = lines.join("\n");
                    det.appendChild(pre);
                  }
                }
                div.appendChild(det);
              }
              const memoLab = document.createElement("label");
              memoLab.className = "adm-memo-apr";
              const memoSp = document.createElement("span");
              memoSp.textContent = "허용 시 내 메모 (누구·용도)";
              const memoInp = document.createElement("input");
              memoInp.type = "text";
              memoInp.maxLength = 300;
              memoInp.placeholder = "예: 홍길동 노트북";
              memoInp.id = "adm-apr-memo-" + x.id;
              memoInp.value = prevAprMemos[x.id] ?? "";
              memoLab.appendChild(memoSp);
              memoLab.appendChild(memoInp);
              div.appendChild(memoLab);
              const row = document.createElement("div");
              row.className = "row";
              const b1 = document.createElement("button");
              b1.type = "button";
              b1.className = "btn-primary";
              b1.dataset.approve = x.id;
              b1.textContent = "승인";
              const b2 = document.createElement("button");
              b2.type = "button";
              b2.className = "btn-secondary";
              b2.dataset.reject = x.id;
              b2.textContent = "거절";
              row.appendChild(b1);
              row.appendChild(b2);
              div.appendChild(row);
              pend.appendChild(div);
            }
          }
          const al = data.allowed || [];
          if (al.length === 0) {
            const p = document.createElement("p");
            p.className = "item";
            p.textContent = "(허용 없음)";
            allow.appendChild(p);
          } else {
            for (const a of al) {
              const div = document.createElement("div");
              div.className = "item";
              const head = document.createElement("div");
              head.className = "item-head";
              const c = document.createElement("code");
              c.textContent = a.ip || "";
              head.appendChild(c);
              head.appendChild(
                document.createTextNode(" · " + fmtGateTime(a.addedAt)),
              );
              div.appendChild(head);
              if (a.mac) {
                const mc = document.createElement("div");
                mc.className = "sub";
                mc.textContent = "MAC: " + a.mac;
                div.appendChild(mc);
              }
              const rq = a.requestMessage || a.note;
              if (rq) {
                const rp = document.createElement("p");
                rp.className = "sub";
                rp.textContent = "신청 메시지: " + rq;
                div.appendChild(rp);
              }
              const memoLab = document.createElement("label");
              memoLab.className = "adm-memo-allow";
              const memoSp = document.createElement("span");
              memoSp.textContent = "내 메모 (누구·용도)";
              const memoInp = document.createElement("input");
              memoInp.type = "text";
              memoInp.maxLength = 300;
              memoInp.className = "adm-allowed-memo-inp";
              const serverMemo = a.memo || "";
              const prevM = prevAllowedMemos[a.ip];
              memoInp.value =
                prevM !== undefined && prevM !== serverMemo ? prevM : serverMemo;
              memoLab.appendChild(memoSp);
              memoLab.appendChild(memoInp);
              div.appendChild(memoLab);
              const row = document.createElement("div");
              row.className = "row";
              const saveBtn = document.createElement("button");
              saveBtn.type = "button";
              saveBtn.className = "btn-secondary";
              saveBtn.dataset.saveMemo = a.ip;
              saveBtn.textContent = "메모 저장";
              const revBtn = document.createElement("button");
              revBtn.type = "button";
              revBtn.className = "btn-ghost";
              revBtn.dataset.revoke = a.ip;
              revBtn.textContent = "허가 취소";
              row.appendChild(saveBtn);
              row.appendChild(revBtn);
              div.appendChild(row);
              allow.appendChild(div);
            }
          }
        } catch (e) {
          $("admErr").textContent = e.message || "목록 실패";
          $("admErr").classList.remove("hidden");
          return;
        }
        if (adminFocusPending) {
          adminFocusPending = false;
          scrollAdminToPending();
        }
        startAdminPoll();
      }

      document.addEventListener("click", async (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLElement)) return;
        const tok = () => token().trim();
        if (t.dataset.approve) {
          const id = t.dataset.approve;
          const tk = tok();
          if (!tk && !lastStatusAdminIp) {
            alert("비밀번호 확인이 필요합니다.");
            return;
          }
          try {
            const headers = withClientMac({ "Content-Type": "application/json" });
            if (tk) headers.Authorization = "Bearer " + tk;
            await api("/api/access/admin/approve", {
              method: "POST",
              headers,
              body: JSON.stringify({
                id,
                memo: (function () {
                  const el = document.getElementById("adm-apr-memo-" + id);
                  return el ? String(el.value || "").trim() : "";
                })(),
              }),
            });
            await loadAdmin();
            await refresh();
          } catch (e) {
            alert(e.message);
          }
        }
        if (t.dataset.saveMemo) {
          const ip = t.dataset.saveMemo;
          const tk = tok();
          if (!tk && !lastStatusAdminIp) {
            alert("비밀번호 확인이 필요합니다.");
            return;
          }
          const item = t.closest(".item");
          const inp = item?.querySelector(".adm-allowed-memo-inp");
          const memo = inp ? String(inp.value || "").trim() : "";
          try {
            const headers = withClientMac({ "Content-Type": "application/json" });
            if (tk) headers.Authorization = "Bearer " + tk;
            await api("/api/access/admin/allowed-memo", {
              method: "POST",
              headers,
              body: JSON.stringify({ ip, memo }),
            });
            await loadAdmin();
            await refresh();
          } catch (e) {
            alert(e.message);
          }
        }
        if (t.dataset.reject) {
          const id = t.dataset.reject;
          const tk = tok();
          if (!tk && !lastStatusAdminIp) {
            alert("비밀번호 확인이 필요합니다.");
            return;
          }
          try {
            const headers = withClientMac({ "Content-Type": "application/json" });
            if (tk) headers.Authorization = "Bearer " + tk;
            await api("/api/access/admin/reject", {
              method: "POST",
              headers,
              body: JSON.stringify({ id }),
            });
            await loadAdmin();
            await refresh();
          } catch (e) {
            alert(e.message);
          }
        }
        if (t.dataset.revoke) {
          const ip = t.dataset.revoke;
          if (
            !confirm(
              "이 IP(" +
                ip +
                ")를 허용 목록에서 제거할까요? 즉시 API 접속이 차단됩니다.",
            )
          ) {
            return;
          }
          const tk = tok();
          if (!tk && !lastStatusAdminIp) {
            alert("비밀번호 확인이 필요합니다.");
            return;
          }
          try {
            const headers = withClientMac({ "Content-Type": "application/json" });
            if (tk) headers.Authorization = "Bearer " + tk;
            await api("/api/access/admin/revoke", {
              method: "POST",
              headers,
              body: JSON.stringify({ ip }),
            });
            await loadAdmin();
            await refresh();
          } catch (e) {
            alert(e.message);
          }
        }
      });

      void refresh();
    </script>
  </body>
</html>
