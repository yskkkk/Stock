# PR 에 .env / .env.local / 키 파일이 포함되면 실패 (공개 저장소 대비)

name: Block secret files in PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  block-secret-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if forbidden paths are in this PR
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$BASE" "$HEAD" | tee changed.txt
          bad=$(grep -E '^\.env$|^\.env\.local$|/\.env$|/\.env\.local$|\.pem$' changed.txt | grep -Fv '.env.example' || true)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo "::error::PR must not add or modify .env / .env.local / .pem — use .env.example + local .env / .env.local only."
            exit 1
          fi
