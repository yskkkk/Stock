<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#1e5fc4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="YSTOCK" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png?v=13" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=13" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=13" />
    <title>YSTOCK</title>
    <script>
      (function () {
        try {
          var k = "stock-app-color-theme";
          var v = localStorage.getItem(k);
          var mode = v === "light" || v === "dark" ? v : "light";
          if (mode === "light") {
            document.documentElement.setAttribute("data-theme", "light");
            var p = localStorage.getItem("stock-app-light-palette");
            var ok = ["mist", "paper", "sage", "lavender", "sand", "dusk"];
            document.documentElement.setAttribute(
              "data-light-palette",
              p && ok.indexOf(p) >= 0 ? p : "mist",
            );
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://s3.tradingview.com" />
    <link rel="preconnect" href="https://s3.tradingview.com" crossorigin />
    <link rel="preconnect" href="https://www.tradingview.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
